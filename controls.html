<!DOCTYPE html>
<html>
    <head>
        <title>MonoPlat Controls</title>
        <link rel ="stylesheet" href = "style.css">
    </head>
    <body>
        <a href = "index.html"><button class = "back">BACK</button></a>
        <h1>CONTROLS</h1>
        <div class = "controlsDisplay">
            
            <div class = "hotkey">A / ←</div>
            <div class = "explanation">Move player left</div>

            <div class = "hotkey">D / →</div>
            <div class = "explanation">Move player right</div>

            <div class = "hotkey">W / ↑</div>
            <div class = "explanation">Jump</div>

            <div class = "hotkey">S / ↓</div>
            <div class = "explanation">Move player down (Only in 0-Gravity)</div>

            <div class = "hotkey">Spacebar</div>
            <div class = "explanation">Dash in the player movement direction</div>

        </div>
    </body>
</html>
